apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-role
rules:
  - apiGroups: [""]
    resources: ["nodes", "pods", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-rolebinding
subjects:
  - kind: ServiceAccount
    name: homepage-sa
    namespace: default
roleRef:
  kind: ClusterRole
  name: homepage-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: default
data:
  kubernetes.yaml: |
    mode: cluster
  bookmarks.yaml: |
    []
  settings.yaml: |
    title: Homelab Dashboard
    background:
      image: https://images.unsplash.com/photo-1579546929518-9e396f3cc809?w=1920&q=80
      opacity: 0.15
      blur: 10px
    cardLayout: cols
    showFavorites: false
    theme: dark
  widgets.yaml: |
    - datetime:
        format:
          dateStyle: long
          timeStyle: medium
        timezone: Asia/Kolkata
    - resources:
        label: Server Host
        cpu: true
        memory: true
        disk: /

  services.yaml: |
    - Infrastructure:
        - Pi-hole:
            icon: pi-hole
            href: https://pihole.homelab/admin/
            description: Ad Blocker & DNS
            widget:
              type: pihole
              url: http://pihole-web.default.svc.cluster.local:80
              key: "{{HOMEPAGE_VAR_PIHOLE_PASSWORD}}"
              version: 6
        - PostgreSQL:
            icon: postgresql
            href: https://pgweb.homelab/
            description: Relational Database
        - Redis Cache:
            icon: redis
            href: https://redis-commander.homelab/
            description: Centralized Cache / MQ
        - Cockpit:
            icon: cockpit
            href: https://192.168.50.120:9090/
            description: Host Administration
            ping: https://192.168.50.120:9090/
        - Beszel Monitor:
            icon: beszel
            href: https://beszel.homelab/
            description: Resource Monitoring
            widget:
              type: beszel
              url: http://localhost:8090
              username: "{{HOMEPAGE_VAR_BESZEL_USER}}"
              password: "{{HOMEPAGE_VAR_BESZEL_PASSWORD}}"
              systemId: homelab
              version: 2
              fields: ["cpu", "memory", "disk", "network"]
        - Uptime Kuma:
            icon: uptime-kuma
            href: https://status.homelab/
            description: Service Availability
            widget:
              type: uptimekuma
              url: http://localhost:3001
              slug: default
        - Dozzle Logs:
            icon: dozzle
            href: https://logs.homelab/
            description: Real-time container logs
            ping: https://logs.homelab/
    - Applications:
        - Home Assistant:
            icon: home-assistant
            href: https://homeassistant.homelab/
            description: Smart Home Hub
            ping: https://homeassistant.homelab/
        - Vaultwarden:
            icon: vaultwarden
            href: https://vaultwarden.homelab/
            description: Password Manager
            ping: https://vaultwarden.homelab/
        - Paperless-ngx:
            icon: paperless
            href: https://paperless.homelab/
            description: Document Archiver
            ping: https://paperless.homelab/
---
apiVersion: v1
kind: Service
metadata:
  name: homepage-service
  namespace: default
spec:
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
  selector:
    app: homepage
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: homepage
  template:
    metadata:
      labels:
        app: homepage
    spec:
      serviceAccountName: homepage-sa
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: homepage
          image: ghcr.io/gethomepage/homepage:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: "${host_ip},${host_ip}:3000,dashboard.homelab,dashboard.homelab:3000,localhost,localhost:3000,127.0.0.1,127.0.0.1:3000"
            - name: HOMEPAGE_VAR_PIHOLE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pihole-admin
                  key: password
            - name: HOMEPAGE_VAR_BESZEL_USER
              valueFrom:
                secretKeyRef:
                  name: beszel-credentials
                  key: username
            - name: HOMEPAGE_VAR_BESZEL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: beszel-credentials
                  key: password
          volumeMounts:
            - name: config
              mountPath: /app/config/kubernetes.yaml
              subPath: kubernetes.yaml
            - name: config
              mountPath: /app/config/settings.yaml
              subPath: settings.yaml
            - name: config
              mountPath: /app/config/widgets.yaml
              subPath: widgets.yaml
            - name: config
              mountPath: /app/config/services.yaml
              subPath: services.yaml
            - name: config
              mountPath: /app/config/bookmarks.yaml
              subPath: bookmarks.yaml
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 128Mi
      volumes:
        - name: config
          configMap:
            name: homepage-config
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "local-ca-issuer"
spec:
  rules:
    - host: dashboard.homelab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage-service
                port:
                  number: 3000
  tls:
    - hosts:
        - dashboard.homelab
      secretName: homepage-tls
