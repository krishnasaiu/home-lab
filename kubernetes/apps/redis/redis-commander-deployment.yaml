apiVersion: v1
kind: Service
metadata:
  name: redis-commander-service
  namespace: default
spec:
  ports:
    - port: 8086
      targetPort: 8086
      protocol: TCP
  selector:
    app: redis-commander
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis-commander
  namespace: default
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: redis-commander
  template:
    metadata:
      labels:
        app: redis-commander
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
        - name: redis-commander
          image: docker.io/rediscommander/redis-commander:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086
              name: http
          env:
            - name: PORT
              value: "8086"
            - name: REDIS_HOSTS
              value: "local:redis-service.default.svc.cluster.local:6379"
          resources:
            limits:
              cpu: 500m
              memory: 256Mi
            requests:
              cpu: 50m
              memory: 64Mi
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redis-commander-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "local-ca-issuer"
spec:
  rules:
    - host: redis-commander.homelab
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: redis-commander-service
                port:
                  number: 8086
  tls:
    - hosts:
        - redis-commander.homelab
      secretName: redis-commander-tls
