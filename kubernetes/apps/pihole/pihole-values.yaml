# ==============================================================================
# Pi-hole Helm Values Configuration
# ==============================================================================

# Admin Password Configuration
# Note: In production, use existingSecret to avoid plain text passwords.
admin:
  enabled: true
  existingSecret: "pihole-admin"
  passwordKey: "password"

# DNS Settings
# Configure Pi-hole to use the Unbound sidecar container running on localhost port 5335
DNS1: "127.0.0.1#5335"
DNS2: ""

# Service Configuration
# Expose DNS (UDP/TCP) and Web Dashboard
serviceDns:
  type: LoadBalancer # K3s ServiceLB will bind to the host's port 53
  port: 53
  annotations: {}

serviceWeb:
  type: ClusterIP # Keep dashboard internal, proxy via Traefik Ingress
  port: 80

# Ingress configuration to expose the web dashboard via Traefik
ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: traefik
  hosts:
    - pihole.homelab
  path: /

# Environment Variables
extraEnvVars:
  TZ: "Asia/Kolkata"
  FTLCONF_dns_listeningMode: "all" # Required for Kubernetes to receive internal pod traffic

# Persistent Storage Configurations
# Uses the K3s default 'local-path' provisioner which persists data across pod restarts.
persistentVolumeClaim:
  enabled: true
  storageClass: "local-path"
  size: 5Gi

dnsmasq:
  persistentVolumeClaim:
    enabled: true
    storageClass: "local-path"
    size: 2Gi

# Resources constraints (adjust based on hardware capabilities)
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

# Unbound sidecar container configuration
extraContainers:
  - name: unbound
    image: docker.io/mvance/unbound:latest
    ports:
      - containerPort: 5335
        name: dns-udp
        protocol: UDP
      - containerPort: 5335
        name: dns-tcp
        protocol: TCP
    volumeMounts:
      - name: unbound-config-volume
        mountPath: /opt/unbound/etc/unbound/unbound.conf
        subPath: unbound.conf
    resources:
      limits:
        cpu: 250m
        memory: 128Mi
      requests:
        cpu: 50m
        memory: 64Mi

extraVolumes:
  - name: unbound-config-volume
    configMap:
      name: unbound-config

